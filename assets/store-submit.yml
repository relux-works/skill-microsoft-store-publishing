name: store-submit

# Manually push a released MSIX to the Microsoft Store via the msstore CLI
# (Store submission API). Deliberately workflow_dispatch — Store submission is
# an intentional act, never automatic on every beta tag.
#
# Prerequisites (all satisfied 2026-07-08, see docs/decisions.md):
#   - Secrets MSSTORE_TENANT_ID / MSSTORE_CLIENT_ID / MSSTORE_CLIENT_SECRET
#   - Repo variable STORE_SELLER_ID
#   - pulsar-store-ci linked in Partner Center as Manager(Windows)
#   - Store account verified
# Auth proven by the store-auth-check workflow (msstore apps list shows your app).
# Setup: secrets MSSTORE_TENANT_ID/MSSTORE_CLIENT_ID/MSSTORE_CLIENT_SECRET,
# repo variables STORE_SELLER_ID and STORE_APP_ID (the Store ProductId).
#
# NOTE: `msstore publish` uploads the package and drives a submission. The
# listing metadata + screenshots must exist on the product (filled once,
# manually or via an init.json) for certification to pass.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag whose MSIX to submit (e.g. v0.3.0-beta.16)"
        required: true

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Install msstore CLI + a Linux secret service
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-0 gnome-keyring dbus-x11
          curl -sL https://github.com/microsoft/msstore-cli/releases/latest/download/MSStoreCLI-linux-x64.tar.gz | tar xz
          chmod +x msstore
      - name: Download the MSIX from the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p pkg
          gh release download "${{ inputs.tag }}" --repo "${{ github.repository }}" \
            --pattern '*.msix' --dir pkg
      - name: Configure + submit
        env:
          TENANT: ${{ secrets.MSSTORE_TENANT_ID }}
          CLIENT: ${{ secrets.MSSTORE_CLIENT_ID }}
          SECRET: ${{ secrets.MSSTORE_CLIENT_SECRET }}
          SELLER: ${{ vars.STORE_SELLER_ID }}
          APP_ID: ${{ vars.STORE_APP_ID }}
        run: |
          # msstore stores credentials via libsecret, which needs a running
          # freedesktop secret service — provide one with an unlocked keyring
          # inside a private dbus session (same as store-auth-check).
          dbus-run-session -- bash -euxc '
            echo "" | gnome-keyring-daemon --unlock --components=secrets
            ./msstore reconfigure --tenantId "$TENANT" --clientId "$CLIENT" --clientSecret "$SECRET" --sellerId "$SELLER"
            # --appId is REQUIRED here: without it msstore looks for a local
            # "initialized project" (msstore init state) and dies with
            # "Failed to find the AppId" — it does NOT match by the package
            # identity inside the MSIX. (The alias is -id with a single dash;
            # --id does not exist — first-submit debugging tripped on that.)
            # APP_ID = your Store ProductId (apps.microsoft.com/detail/<it>),
            # stable for the product lifetime; set the STORE_APP_ID repo var.
            MSIX=$(ls pkg/*.msix | head -1)
            set +e
            ./msstore publish "$MSIX" --appId "$APP_ID" --verbose
            rc=$?
            if [ $rc -ne 0 ]; then
              # Partner Center 504s are routine. If the failure hit AFTER the
              # commit (the CLI keeps polling status and a poll can die), the
              # submission is already in certification server-side — verify by
              # status instead of reporting a false failure.
              for i in 1 2 3; do
                out=$(./msstore submission status "$APP_ID" 2>&1) && break
                sleep 20
              done
              echo "$out"
              if echo "$out" | grep -qE "CommitStarted|PreProcessing|Certification|Publishing|Published|Release"; then
                echo "publish exited $rc but the submission is committed and progressing — treating as success"
                rc=0
              fi
            fi
            exit $rc
          '
